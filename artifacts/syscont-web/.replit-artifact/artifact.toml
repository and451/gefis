kind = "web"
previewPath = "/"
title = "SysCont Web"
version = "1.0.0"
id = "artifacts/syscont-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18538

[services.development]
run = "pnpm --filter @workspace/syscont-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/syscont-web", "run", "build" ]
publicDir = "artifacts/syscont-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18538"
BASE_PATH = "/"
